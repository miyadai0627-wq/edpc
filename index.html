<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Voice Check</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">

        <h1>Custom Voice Check</h1>
        <button class="btn-start">&#128483;練習スタート！</button>

        <div class="input-area">
            <input id="english-input" type="text" name="EnglishInput" placeholder="英語を入力…">
            <input id="japanese-input" type="text" name="JapaneseInput" placeholder="日本語を入力…">
            <button id="btn-add" class="btn-add">&plus;追加する</button>
        </div>
        <h2>Myフレーズ一覧</h2>
        <button id="btn-all-delete" class="btn-delete" style="width: 100%; margin-bottom: 15px;">🗑 すべての単語を消去する</button>
        <ul id="phrase-list">
            <li>
                <input type="checkbox">
                <div>
                    <strong>I'll be right back.</strong><br>
                    <span style="font-size: 14px; color: #888;">(すぐ戻ります)</span>
                </div>
                <button class="btn-delete">&#128465;</button>
            </li>
        </ul>
        <div id="practice-area" class="practice-area">
            <button class="btn-back">&lt; 一覧に戻る</button>

            <p id="practice-counter" style="color: #8A9A5B; font-weight: bold;"></p>

            <h3 id="question-text">Question Area</h3>

            <div class="practice-controls">
                <button id="btn-show-answer" class="btn-add">答えを表示</button>
                <button id="btn-next-question" class="btn-start" style="display: none;">次の問題へ</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
