<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Voice Check</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">

        <h1>Custom Voice Check</h1>
        <button class="btn-start">&#128483;練習スタート！</button>

        <div class="input-area">
            <input type="text" name="EnglishInput" placeholder="英語を入力…">
            <input type="text" name="JapaneseInput" placeholder="日本語を入力…">
            <button class="btn-add">&plus;追加する</button>
        </div>
        <h2>Myフレーズ一覧</h2>
        <ul id="phrase-list">
            <li>
                <input type="checkbox"> <div>
                    <strong>I'll be right back.</strong><br>
                    <span style="font-size: 14px; color: #888;">(すぐ戻ります)</span>
                </div>
                <button class="btn-delete">&#128465;</button> </li>
            </ul>
        <div id="practice-area" class="practice-area">
            <button class="btn-back">&lt;一覧に戻る</button>
            <h3>Sounds good to me.</h3>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
